name: dagger-check-cli

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main

jobs:
  dagger-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Dagger CLI
        shell: bash
        run: |
          curl -fsS https://dl.dagger.io/dagger/install.sh | BIN_DIR=$HOME/.local/bin sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Run dagger check
        shell: bash
        run: dagger check
