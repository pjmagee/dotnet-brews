name: dagger-check-cli

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main

jobs:
  dagger-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run dagger check
        uses: dagger/dagger-for-github@v8.3.0
        with:
          check: "**"
          version: "v0.20.0"
